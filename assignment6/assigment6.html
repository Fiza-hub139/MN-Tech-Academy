<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>Student Registration Form</legend>
        <h2 style="text-align: center">Student Registration Form</h2>
        <label for="">First Name</label>
        <input type="text" placeholder="Enter your First Name" required />
        <label for="">Last Name</label>
        <input
          type="text"
          placeholder="Enter your Last Name"
          required
        /><br /><br />
        <label for="">Email Address</label>
        <input type="email" required /><br /><br />
        <label for="">Phone Number</label>
        <input type="number" /><br /><br />
        <label for="">Enter Password</label>
        <input type="password" required />
        <label for="">Re-enter Password</label>
        <input type="password" required /><br /><br />
        <label for="">Gender:</label>
        <input type="radio" name="G" id="" /><label for="">Male</label>
        <input type="radio" name="G" id="" /><label for="">Female</label>
        <input type="radio" name="G" id="" /><label for="">Other</label
        ><br /><br />
        <label for="">Enter you DOB</label>
        <input type="date" name="" id="" />

        <select name="" id="">
          <option value="">Select your City</option>
          <option value="">Karachi</option>
          <option value="">Lahore</option>
          <option value="">Islamabad</option>
          <option value="">Other city</option>
        </select><br /><br />
        
        <label for="">Your Skills: </label>
        <input type="checkbox" name="HTML" id="" />HTML
        <input type="checkbox" name="CSS" id="" />CSS
        <input type="checkbox" name="JS" id="" />JS
        <input type="checkbox" name="JS" id="" />Other <br /><br />
        <label for="">Upload you CV here: </label>
        <input type="file" name="" id="" /><br /><br /><br />

        <label for="">Enter Messgae</label>
        <textarea name="" id="" placeholder="Type Here" rows="1"></textarea
        ><br /><br />

        <input type="button" value="Submit" />
        <button type="reset">Reset</button>
      </fieldset>
    </form>
  </body>
</html>
